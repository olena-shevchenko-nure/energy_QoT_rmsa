  - train
hard_case_fraction: 0.70
hard_case_small_margin: 0.03
hard_case_min_candidates: 4
n_max: 32
hidden_dim: 128
epochs: 3
patience: 2
supervised_warmup_epochs: 2
learning_rate: 0.0002
weight_decay: 0.0001
gamma: 0.95
n_step_return: 3
target_update_interval: 100
freeze_encoders: true
initial_dqn_checkpoint: runs/eon/eon_train_dqn_mvp_fast_residual_clamp010/20260531_094018_unknown/dqn_best.pt
learning_target: blocking_sensitive_hybrid
q_score_mode: q_head_residual
residual_scale: 1.0
