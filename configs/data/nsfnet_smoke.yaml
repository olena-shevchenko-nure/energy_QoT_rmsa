bit_rates:
  100: 0.45
  200: 0.35
  400: 0.20
load_profiles:
  low: 3.0
  medium: 5.0
  high: 8.0
  overload: 12.0
splits:
  train:
    seeds: [0, 1, 2, 3, 4]
    requests_per_seed: 300
