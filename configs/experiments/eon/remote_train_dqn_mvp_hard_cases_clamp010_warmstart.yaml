residual_l2_weight: 0.08
td_loss_weight: 0.10
imitation_loss_weight: 2.00
ranking_loss_weight: 0.75
ranking_margin: 0.03
target_topn_rank_weight: 0.20
target_fragmentation_weight: 0.45
target_lmax_weight: 0.45
target_small_gap_weight: 0.45
