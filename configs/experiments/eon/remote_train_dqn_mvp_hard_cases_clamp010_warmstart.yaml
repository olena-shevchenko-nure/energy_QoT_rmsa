experiment_name: eon_train_dqn_mvp_hard_cases_clamp010_warmstart
stage: train_dqn
dataset_path: data/eon/generated/nsfnet_mvp_ong_expert_hard_cases
runs_root: runs/eon
seed: 42
device: auto
splits:
  - train
  - val
  - test
batch_size: 64
max_batches: 25
progress_every_batches: 5
train_transition_limit: 4000
val_transition_limit: 1000
test_transition_limit: 1000
transition_sampling_mode: hard_case
