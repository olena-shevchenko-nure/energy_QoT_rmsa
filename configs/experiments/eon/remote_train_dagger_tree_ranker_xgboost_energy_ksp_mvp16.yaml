experiment_name: eon_train_dagger_tree_ranker_xgboost_energy_ksp_mvp16
stage: train_dagger_tree_ranker
dataset_path: data/eon/generated/nsfnet_mvp_ong_expert_hybrid_mix
runs_root: runs/eon
seed: 42
device: auto
n_max: 32
hidden_dim: 128

dagger_base_policy: energy-aware-ksp-bm-ff
dagger_train_split: train
dagger_eval_split: val
dagger_iterations: 2
dagger_follow_trained_ranker: true
dagger_train_max_episodes: 16
