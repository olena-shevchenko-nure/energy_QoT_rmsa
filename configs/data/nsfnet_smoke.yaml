    seeds: [200, 201, 202]
    requests_per_seed: 500
scoring:
  lambda_frag: 1.0
  lambda_gap: 0.6
  lambda_lmax: 0.4
  lambda_fit: 0.3
  mu_energy: 0.25
  mu_delay: 0.2
  mu_qot: 0.2
  mu_width: 0.1
  energy_norm_w: 1200.0
collection_policy:
  softmax_tau: 0.35
  softmax_top_k: 8
reward:
  alpha_energy: 0.2
  beta_fragmentation: 0.3
  kappa_qot: 0.1
  mu_delay: 0.1
q_head:
  c1: 0.25
  c2: 0.35
  c3: 0.1
  c4: 0.1
  c5: 0.1
  c6: 0.1

